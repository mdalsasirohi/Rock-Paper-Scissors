<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROCK-PAPER-SCISSORS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <H1>ROCK PAPER SCISSORS</H1>
        <div class="container">
            <div class="icons">
                <button id="rock"></button>
                <button id="paper"></button>
                <button id="scissors"></button>
            </div>
        </div>

        <div class="score">
            <div class="you scoreinner">YOU</div>
            <div class="computer scoreinner">COMPUTER</div>
            <div class="youscore scoreinner"></div>
            <div class="compscore scoreinner"></div>
            <div class="youchoice scoreinner"></div>
            <div class="compchoice scoreinner"></div>
        </div>
        
    </main>
    <button class="start">START</button>
    <script src="app.js"></script>
</body>
</html>
